<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WeRead AI 验证脚本 - 离线测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
    }
    h1 { font-size: 20px; margin-bottom: 10px; }
    .subtitle { color: #888; margin-bottom: 30px; }
    .reader-mock {
      border: 1px solid #ddd;
      padding: 20px;
      margin: 20px 0;
      background: #fafafa;
      border-radius: 8px;
    }
    .readerTopBar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .readerTopBar_title_link { font-weight: 600; }
    .readerTopBar_title_chapter { color: #666; }
    .readerChapterContent { line-height: 1.8; }
    .preRenderContainer { display: none; }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007AFF;
      color: white;
    }
    button:hover { background: #0056b3; }
    .log {
      margin-top: 20px;
      padding: 15px;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-entry { margin-bottom: 4px; }
    .success { color: #4ec9b0; }
    .error { color: #f48771; }
    .warn { color: #dcdcaa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WeRead AI 验证脚本 - 离线测试</h1>
    <div class="subtitle">模拟微信读书网页版 DOM 结构，测试提取逻辑</div>

    <div class="reader-mock" id="reader-mock">
      <div class="readerTopBar">
        <span class="readerTopBar_title_link">测试书籍</span>
        <span class="readerTopBar_title_chapter">第1章 测试章节</span>
      </div>

      <div class="readerContent routerView">
        <div class="preRenderContainer" id="preRenderContainer">
          <div id="preRenderContent">
            <h1>第1章 测试章节</h1>
            <p>这是第一段测试文本。用来验证章节内容提取功能是否正常工作。</p>
            <p>这是第二段测试文本。包含更多的内容以便测试字数统计功能。</p>
            <p>这是第三段测试文本。总共有三段，应该显示段落数为3。</p>
          </div>
        </div>

        <div class="readerChapterContent">
          <h1>第1章 测试章节</h1>
          <p>这是第一段测试文本。用来验证章节内容提取功能是否正常工作。</p>
          <p>这是第二段测试文本。包含更多的内容以便测试字数统计功能。</p>
          <p>这是第三段测试文本。总共有三段，应该显示段落数为3。</p>
        </div>
      </div>
    </div>

    <div class="controls">
      <button onclick="switchChapter()">切换章节</button>
      <button onclick="clearLog()">清除日志</button>
      <button onclick="testExtract()">手动测试提取</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    let chapterNum = 1;

    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function switchChapter() {
      chapterNum++;
      const title = document.querySelector('.readerTopBar_title_chapter');
      const h1 = document.querySelector('.readerChapterContent h1');
      const preContent = document.getElementById('preRenderContent');
      const readerContent = document.querySelector('.readerChapterContent');

      const newTitle = `第${chapterNum}章 新章节`;
      title.textContent = newTitle;
      h1.textContent = newTitle;

      const newContent = `
        <h1>${newTitle}</h1>
        <p>这是第${chapterNum}章的内容。每次切换章节都会生成不同的文本。</p>
        <p>第二段文本，用于测试段落提取功能。</p>
        <p>第三段文本，验证段落计数是否正确。</p>
        <p>第四段文本，确保内容足够丰富。</p>
      `;

      preContent.innerHTML = newContent;
      readerContent.innerHTML = newContent;

      log(`切换到 ${newTitle}`, 'success');

      // 触发 MutationObserver
      const event = new Event('DOMContentLoaded');
      document.dispatchEvent(event);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    function testExtract() {
      log('手动测试提取...');

      const preRender = document.querySelector('#preRenderContent');
      if (preRender) {
        const html = preRender.innerHTML || '';
        log(`#preRenderContent htmlLen=${html.length}`);
      } else {
        log('#preRenderContent 未找到', 'error');
      }

      const readerContent = document.querySelector('.readerChapterContent');
      if (readerContent) {
        const text = readerContent.textContent?.trim() || '';
        log(`.readerChapterContent textLen=${text.length}`);
      } else {
        log('.readerChapterContent 未找到', 'error');
      }

      const vueEl = document.querySelector('div.readerContent.routerView');
      if (vueEl) {
        log(`Vue 元素存在，__vue__=${!!vueEl.__vue__}`);
      }
    }

    log('测试页面已加载。点击"切换章节"模拟翻页，或"手动测试提取"验证提取逻辑。');
  </script>

  <script src="verify.user.js"></script>
</body>
</html>
