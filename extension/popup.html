<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h2 {
      margin: 0;
      font-size: 16px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.ready { background: #d4edda; color: #155724; }
    .status.warning { background: #fff3cd; color: #856404; }
    .btn {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-primary {
      background: #007AFF;
      color: white;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>WeRead AI</h2>
  </div>
  <div class="status" id="status">检查配置中...</div>
  <button class="btn btn-primary" id="open-settings">打开设置</button>
  <button class="btn btn-secondary" id="clear-cache">清除缓存</button>

  <script src="popup.js"></script>
</body>
</html>
