<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WeRead AI Reader - 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 620px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #333;
    }
    .subtitle {
      color: #777;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .section {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid #eee;
    }
    .section:last-child {
      border-bottom: none;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #007AFF;
    }
    .help-text {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      margin-right: 8px;
    }
    .btn:hover {
      background: #0056b3;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      white-space: pre-wrap;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WeRead AI Reader</h1>
    <div class="subtitle">配置 Chrome 扩展连接的 Agent 服务器</div>

    <div class="section">
      <div class="section-title">Agent 服务器</div>
      <div class="form-group">
        <label for="agent-server-url">Agent Server URL</label>
        <input type="text" id="agent-server-url" placeholder="http://127.0.0.1:8787">
        <div class="help-text">WeRead API Key 和 LLM API Key 都配置在服务器环境变量中，不保存在 Chrome 扩展里。</div>
      </div>
      <div class="form-group">
        <label for="client-token">clientToken</label>
        <input type="password" id="client-token" placeholder="dev-token">
        <div class="help-text">V1 映射到单用户 Agent 服务器，未来可扩展为多用户访问令牌。</div>
      </div>
    </div>

    <button class="btn" id="save-btn">保存配置</button>
    <button class="btn btn-secondary" id="test-btn">测试连接</button>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
