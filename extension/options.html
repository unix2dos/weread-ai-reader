<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WeRead AI Reader - 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #333;
    }
    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .section {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid #eee;
    }
    .section:last-child {
      border-bottom: none;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }
    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #007AFF;
    }
    .help-text {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
    }
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover {
      background: #0056b3;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WeRead AI Reader</h1>
    <div class="subtitle">配置你的 AI 阅读助手</div>

    <div class="section">
      <div class="section-title">📚 微信读书 API</div>
      <div class="form-group">
        <label for="weread-api-key">WeRead API Key</label>
        <input type="password" id="weread-api-key" placeholder="wrk-xxxxxxxx">
        <div class="help-text">从 <a href="https://weread.qq.com/r/weread-skills" target="_blank">weread.qq.com/r/weread-skills</a> 获取</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🤖 LLM 配置</div>
      <div class="form-group">
        <label for="llm-provider">AI 提供商</label>
        <select id="llm-provider">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="form-group">
        <label for="llm-api-key">API Key</label>
        <input type="password" id="llm-api-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label for="llm-model">模型</label>
        <input type="text" id="llm-model" value="gpt-4o-mini" placeholder="gpt-4o-mini">
        <div class="help-text">推荐: gpt-4o-mini, claude-3-haiku-20240307</div>
      </div>
      <div class="form-group" id="custom-base-group" style="display:none;">
        <label for="llm-api-base">API 基础 URL</label>
        <input type="text" id="llm-api-base" placeholder="https://api.openai.com/v1">
      </div>
    </div>

    <button class="btn" id="save-btn">保存配置</button>
    <button class="btn btn-secondary" id="test-btn">测试连接</button>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
