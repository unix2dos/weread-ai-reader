<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1000" height="640" fill="#f5f5f5"/>
  <g transform="translate(190 58)" filter="url(#cardShadow)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect width="620" height="524" rx="12" fill="#ffffff"/>
    <text x="30" y="62" fill="#333333" font-size="24" font-weight="800">WeRead AI Reader</text>
    <text x="30" y="91" fill="#777777" font-size="14">配置 Chrome 扩展连接的 Agent 服务器</text>

    <line x1="30" x2="590" y1="128" y2="128" stroke="#eeeeee"/>
    <text x="30" y="158" fill="#333333" font-size="16" font-weight="700">Agent 服务器</text>

    <text x="30" y="204" fill="#555555" font-size="14" font-weight="600">Agent Server URL</text>
    <rect x="30" y="218" width="560" height="42" rx="8" fill="#ffffff" stroke="#dddddd"/>
    <text x="44" y="245" fill="#111827" font-size="15">http://127.0.0.1:19763</text>
    <text x="30" y="284" fill="#888888" font-size="12">这是本机 Node Agent 服务地址。WeRead API Key 和 LLM API Key 都配置在服务器环境变量中。</text>

    <text x="30" y="334" fill="#555555" font-size="14" font-weight="600">clientToken</text>
    <rect x="30" y="348" width="560" height="42" rx="8" fill="#ffffff" stroke="#dddddd"/>
    <text x="44" y="375" fill="#111827" font-size="15">dev-token</text>
    <g transform="translate(552 359)">
      <path d="M0 10C5 3 10 1 15 1C20 1 25 3 30 10C25 17 20 19 15 19C10 19 5 17 0 10Z" fill="none" stroke="#007aff" stroke-width="2"/>
      <circle cx="15" cy="10" r="4" fill="#007aff"/>
    </g>
    <text x="30" y="414" fill="#888888" font-size="12">扩展访问 Agent 服务器的共享访问令牌，需要和服务器环境变量 CLIENT_TOKEN 一致。</text>

    <line x1="30" x2="590" y1="448" y2="448" stroke="#eeeeee"/>
    <rect x="30" y="474" width="96" height="40" rx="8" fill="#007aff"/>
    <text x="78" y="500" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">保存配置</text>
    <rect x="142" y="474" width="96" height="40" rx="8" fill="#f0f0f0"/>
    <text x="190" y="500" text-anchor="middle" fill="#333333" font-size="14" font-weight="700">测试连接</text>
  </g>
</svg>
