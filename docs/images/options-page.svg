<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f4f6f8"/>
  <g transform="translate(118 72)" filter="url(#cardShadow)">
    <rect width="964" height="616" rx="18" fill="#ffffff"/>
    <text x="64" y="82" fill="#2f3337" font-size="40" font-weight="800" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">WeRead AI Reader</text>
    <text x="64" y="128" fill="#74777c" font-size="22" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">配置 Chrome 扩展连接的 Agent 服务器</text>

    <text x="64" y="210" fill="#2f3337" font-size="27" font-weight="800" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Agent 服务器</text>

    <text x="64" y="276" fill="#555a60" font-size="22" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Agent Server URL</text>
    <rect x="64" y="294" width="836" height="64" rx="14" fill="#ffffff" stroke="#d9d9d9" stroke-width="2"/>
    <text x="84" y="336" fill="#111827" font-size="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">http://127.0.0.1:19763</text>
    <text x="64" y="392" fill="#7a7f86" font-size="20" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">这是本机 Node Agent 服务地址；WeRead 和 LLM Key 只在服务器环境变量中。</text>

    <text x="64" y="458" fill="#555a60" font-size="22" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">clientToken</text>
    <rect x="64" y="476" width="836" height="64" rx="14" fill="#ffffff" stroke="#d9d9d9" stroke-width="2"/>
    <text x="84" y="518" fill="#111827" font-size="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">dev-token</text>
    <g transform="translate(846 494)">
      <rect width="36" height="28" rx="14" fill="#eef6ff"/>
      <path d="M7 14C11 8 15 6 18 6C21 6 25 8 29 14C25 20 21 22 18 22C15 22 11 20 7 14Z" fill="none" stroke="#007aff" stroke-width="2"/>
      <circle cx="18" cy="14" r="4" fill="#007aff"/>
    </g>
    <text x="64" y="574" fill="#7a7f86" font-size="20" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">clientToken 是扩展访问 Agent 服务器的共享访问令牌，不是 API Key。</text>

    <rect x="64" y="634" width="154" height="56" rx="12" fill="#007aff"/>
    <text x="141" y="670" text-anchor="middle" fill="#ffffff" font-size="23" font-weight="800" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">保存配置</text>
    <rect x="244" y="634" width="154" height="56" rx="12" fill="#eeeeee"/>
    <text x="321" y="670" text-anchor="middle" fill="#333333" font-size="23" font-weight="800" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">测试连接</text>
  </g>
</svg>
