<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320">
  <defs>
    <filter id="chipShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7f5d5"/>
      <stop offset="1" stop-color="#d9ecbd"/>
    </linearGradient>
  </defs>
  <rect width="760" height="320" rx="30" fill="url(#bg)"/>
  <g opacity="0.35" fill="#253022" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="78" y="96" font-size="32">“这里的概念值得暂停一下。”</text>
    <text x="78" y="154" font-size="32">继续阅读时，AI 入口保持最小干扰。</text>
  </g>
  <g transform="translate(344 132)" filter="url(#chipShadow)">
    <rect width="58" height="42" rx="21" fill="#ffffff" stroke="#d7dee8"/>
    <text x="29" y="27" text-anchor="middle" fill="#2563eb" font-size="14" font-weight="800" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">AI</text>
  </g>
  <text x="380" y="232" text-anchor="middle" fill="#334155" font-size="18" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">按 Option+Q 展开面板</text>
</svg>
