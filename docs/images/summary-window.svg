<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760">
  <defs>
    <filter id="windowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="28" fill="#edf2f7"/>

  <g transform="translate(36 34)" filter="url(#windowShadow)">
    <rect width="1128" height="692" rx="18" fill="#f6f7f9" stroke="#cbd5e1"/>
    <rect width="1128" height="48" rx="18" fill="#f8fafc"/>
    <rect y="34" width="1128" height="14" fill="#f8fafc"/>
    <circle cx="24" cy="24" r="8" fill="#ef4444"/>
    <circle cx="48" cy="24" r="8" fill="#f59e0b"/>
    <circle cx="72" cy="24" r="8" fill="#22c55e"/>
    <text x="564" y="30" text-anchor="middle" fill="#3f4650" font-size="16" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">WeRead AI 摘要</text>

    <g transform="translate(22 74)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <text x="0" y="0" fill="#1f2933" font-size="24" font-weight="800">WeRead AI</text>
      <text x="0" y="28" fill="#667085" font-size="13">被放大的欲望 · 第二章 中国制造纺织品 · 正文采集 2,120 字 / 官方 21,001 字 · 覆盖约 10% · 被动累计</text>
      <rect x="986" y="-8" width="96" height="30" rx="7" fill="#1769aa"/>
      <text x="1034" y="12" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">本章判断</text>
      <rect x="970" y="36" width="112" height="48" rx="8" fill="#e7f6ed" stroke="#cfe8d8"/>
      <text x="1026" y="56" text-anchor="middle" fill="#1f7a4d" font-size="12" font-weight="700">判断完成</text>
      <text x="1026" y="75" text-anchor="middle" fill="#1f7a4d" font-size="11">OK</text>
    </g>

    <line x1="22" x2="1106" y1="152" y2="152" stroke="#d9e0e7"/>

    <g transform="translate(22 176)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <rect width="1084" height="282" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
      <text x="18" y="34" fill="#1f2933" font-size="18" font-weight="800">阅读判断</text>
      <rect x="18" y="58" width="78" height="34" rx="8" fill="#e7f1fb"/>
      <text x="57" y="80" text-anchor="middle" fill="#1769aa" font-size="15" font-weight="800">值得精读</text>

      <g transform="translate(856 22)">
        <rect width="198" height="96" rx="8" fill="#f8fbff" stroke="#d6e6f5"/>
        <text x="99" y="22" text-anchor="middle" fill="#667085" font-size="11">掌握价值</text>
        <text x="99" y="57" text-anchor="middle" fill="#1769aa" font-size="34" font-weight="800">82</text>
        <line x1="12" x2="186" y1="68" y2="68" stroke="#e1edf7"/>
        <text x="38" y="86" text-anchor="middle" fill="#667085" font-size="10">密度 80</text>
        <text x="99" y="86" text-anchor="middle" fill="#667085" font-size="10">结构 90</text>
        <text x="160" y="86" text-anchor="middle" fill="#667085" font-size="10">风险 70</text>
      </g>

      <text x="18" y="128" fill="#263746" font-size="14" font-weight="800">最需要掌握</text>
      <text x="34" y="156" fill="#1f2933" font-size="14">• 全球供应链转移如何改变本章的论证方向</text>
      <text x="34" y="184" fill="#1f2933" font-size="14">• 工厂管理者叙事如何服务于后续主题</text>
      <text x="34" y="212" fill="#1f2933" font-size="14">• 从原棉到面料的复杂流程为什么值得放慢</text>

      <text x="18" y="244" fill="#263746" font-size="14" font-weight="800">追问问题</text>
      <text x="34" y="268" fill="#1f2933" font-size="14">• 旧工厂与新工厂的技术差异背后，作者真正想比较什么？</text>
    </g>

    <g transform="translate(22 478)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <rect width="1084" height="154" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
      <text x="18" y="32" fill="#1f2933" font-size="16" font-weight="800">阅读信号</text>
      <text x="956" y="34" fill="#64748b" font-size="13">默认展开</text>

      <text x="18" y="62" fill="#263746" font-size="13" font-weight="800">热门划线</text>
      <text x="34" y="90" fill="#1f2933" font-size="13">• “中国消耗同样数量的能源，产生的碳更多。”</text>
      <text x="1010" y="90" text-anchor="end" fill="#667085" font-size="12">78 人</text>
      <text x="58" y="116" fill="#667085" font-size="12">评论：这段把成本、环境和全球化的矛盾连在一起。</text>

      <text x="34" y="142" fill="#1f2933" font-size="13">• “旧工厂和新工厂的差异，不只是效率差异。”</text>
      <text x="1010" y="142" text-anchor="end" fill="#667085" font-size="12">42 人</text>
    </g>

    <g transform="translate(22 648)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <rect width="520" height="38" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
      <text x="18" y="25" fill="#1f2933" font-size="15" font-weight="800">整本书评价背景</text>
      <text x="456" y="25" fill="#64748b" font-size="13">折叠</text>

      <rect x="564" width="520" height="38" rx="8" fill="#ffffff" stroke="#d9e0e7"/>
      <text x="582" y="25" fill="#1f2933" font-size="15" font-weight="800">调试</text>
      <text x="1020" y="25" fill="#64748b" font-size="13">折叠</text>
    </g>
  </g>
</svg>
